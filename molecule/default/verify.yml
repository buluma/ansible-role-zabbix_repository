---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install a zabbix package
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop:
        - zabbix-get
        - zabbix-agent
      when:
        - ansible_facts['distribution'] in [ "CentOS", "RedHat", "Rocky", "AlmaLinux" ] or ansible_facts['os_family'] in [ "Debian", "Suse" ]
